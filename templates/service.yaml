apiVersion: v1
kind: Service
metadata:
  name: {{ include "hanko.fullname" . }}-public
  labels:
    {{- include "hanko.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.public.port }}
      targetPort: http-public
      protocol: TCP
      name: http-public
  selector:
    {{- include "hanko.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hanko.fullname" . }}-admin
  labels:
    {{- include "hanko.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.admin.port }}
      targetPort: http-admin
      protocol: TCP
      name: http-admin
  selector:
    {{- include "hanko.selectorLabels" . | nindent 4 }}
